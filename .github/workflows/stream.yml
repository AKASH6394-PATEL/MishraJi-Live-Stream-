name: Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:

    - name: Install FFmpeg
      run: |
        sudo apt update
        sudo apt install ffmpeg -y

    - name: Start Stream
      run: |
        ffmpeg -re -stream_loop -1 \
        -i "https://github.com/AKASH6394-PATEL/Shiva-Live-Stream/releases/download/v1/shiv-loop-video.mp4" \
        -i "https://github.com/AKASH6394-PATEL/Shiva-Live-Stream/releases/download/v1/shiv-mantra-master-47min.mp3" \
        -c:v copy \
        -c:a aac -b:a 128k \
        -f flv rtmp://a.rtmp.youtube.com/live2/${{ secrets.STREAM_KEY }}
