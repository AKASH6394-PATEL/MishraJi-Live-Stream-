name: 24/7 Kashi Video Stream

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' 

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup System
      run: |
        sudo apt-get update && sudo apt-get install -y ffmpeg wget

    - name: Download Audio Assets
      run: |
        # Download files with consistent names
        wget -O morning.mp3 https://github.com/${{ github.repository }}/releases/download/v1/morning_audio.mp3 || echo "File not found"
        wget -O afternoon.mp3 https://github.com/${{ github.repository }}/releases/download/v1/afternoon_audio.mp3 || echo "File not found"
        wget -O evening.mp3 https://github.com/${{ github.repository }}/releases/download/v1/evening_aarti_audio.mp3 || echo "File not found"
        wget -O night.mp3 https://github.com/${{ github.repository }}/releases/download/v1/night_audio.mp3 || echo "File not found"

    - name: Run Video Stream
      run: |
        # IST Time Calculate
        H=$(date -u -d "+5 hours 30 minutes" +%H)
        echo "Current IST Hour: $H"

        # Logic based on your HTML time slots
        if [ $H -ge 05 ] && [ $H -lt 12 ]; then
          V="morning.video.mp4"; A="morning.mp3"
        elif [ $H -ge 12 ] && [ $H -lt 17 ]; then
          V="morning.video.mp4"; A="afternoon.mp3"
        elif [ $H -ge 17 ] && [ $H -lt 20 ]; then
          V="ganga_aarti_video.mp4"; A="evening.mp3"
        else
          V="ganga_aarti_video.mp4"; A="night.mp3"
        fi

        # FFmpeg Command for Video + Audio
        # -stream_loop -1: Video/Audio repeat karne ke liye
        # -t 21500: GitHub Action limit (approx 6 hours)
        
        ffmpeg -re -stream_loop -1 -i "$V" -stream_loop -1 -i "$A" \
        -map 0:v:0 -map 1:a:0 \
        -c:v libx264 -preset superfast -b:v 2500k -maxrate 2500k -bufsize 5000k \
        -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 \
        -t 21500 -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
